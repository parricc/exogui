name: Open Release PR

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  open-release-pr:
    name: Create or update release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base master --head develop --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base master \
              --head develop \
              --title "Release: develop → master" \
              --body "Merging this PR will trigger an automatic patch version bump and release."
          else
            echo "PR #${EXISTING} already exists, nothing to do."
          fi
